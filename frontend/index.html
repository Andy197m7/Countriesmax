
<h2 class="sr-only">PopulationMax — Global Demographic Intelligence Dashboard with 198 countries, population charts, AI forecast engine, and full data table</h2>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#020617;--bg1:#0a0f1e;--bg2:#0f172a;--bg3:#1e293b;
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--t4:#334155;
  --blue:#2563eb;--blue2:#1d4ed8;--blue3:#60a5fa;
  --green:#10b981;--green2:#34d399;
  --rose:#f43f5e;--amber:#f59e0b;--indigo:#818cf8;
  --border:#1e293b;
}
body{background:var(--bg0);color:var(--t1);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

.app{padding:18px 22px;max-width:1180px;margin:0 auto}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.logo-icon{width:36px;height:36px;background:var(--blue2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 18px rgba(37,99,235,0.35)}
.logo h1{font-size:20px;font-weight:900;letter-spacing:-.5px}
.logo p{font-size:8px;font-weight:700;letter-spacing:.2em;color:var(--t3);text-transform:uppercase;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* VIEW TOGGLE */
.vtoggle{display:flex;background:var(--bg1);border:1px solid var(--border);border-radius:11px;padding:3px;gap:2px}
.vbtn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;font-size:10px;font-weight:800;cursor:pointer;border:none;background:none;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;transition:all .2s}
.vbtn i{font-size:13px}
.vbtn.on{background:var(--bg2);color:var(--blue3);box-shadow:0 1px 4px rgba(0,0,0,.4)}

/* SEARCH */
.srch-wrap{position:relative}
.srch-box{display:flex;align-items:center;gap:7px;background:var(--bg1);border:1.5px solid var(--border);border-radius:11px;padding:7px 13px;width:230px;transition:border .2s}
.srch-box:focus-within{border-color:var(--blue)}
.srch-box i{color:var(--t3);font-size:14px}
.srch-box input{background:none;border:none;color:var(--t1);font-size:12px;font-weight:600;outline:none;width:100%;font-family:inherit}
.srch-box input::placeholder{color:var(--t4)}
.srch-drop{position:absolute;top:calc(100%+5px);left:0;right:0;background:#0d1627;border:1.5px solid var(--border);border-radius:11px;z-index:200;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,.6);display:none}
.srch-item{padding:9px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bg2);transition:background .1s;font-size:12px;font-weight:700;color:var(--t2)}
.srch-item:last-child{border-bottom:none}
.srch-item:hover{background:var(--bg2);color:var(--t1)}
.srch-code{font-size:9px;font-weight:800;letter-spacing:.08em;background:var(--bg3);padding:2px 5px;border-radius:4px;color:var(--t3)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px}
.sc{background:var(--bg1);border:1px solid var(--border);border-radius:15px;padding:16px;transition:transform .2s,border-color .2s}
.sc:hover{transform:translateY(-2px);border-color:var(--bg3)}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.sc-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.sc-icon.bl{background:rgba(37,99,235,.15)}
.sc-icon.gr{background:rgba(16,185,129,.15)}
.sc-icon.am{background:rgba(245,158,11,.15)}
.sc-icon.rs{background:rgba(244,63,94,.15)}
.badge{display:inline-flex;align-items:center;gap:2px;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.badge.up{background:rgba(16,185,129,.1);color:var(--green2);border:1px solid rgba(16,185,129,.2)}
.badge.dn{background:rgba(244,63,94,.1);color:#fb7185;border:1px solid rgba(244,63,94,.2)}
.badge.nu{background:rgba(71,85,105,.2);color:var(--t3);border:1px solid rgba(71,85,105,.25)}
.sc-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;color:var(--t3);text-transform:uppercase;margin-bottom:4px}
.sc-val{font-size:24px;font-weight:900;letter-spacing:-.6px}

/* MAIN GRID */
.main-grid{display:grid;grid-template-columns:1fr 320px;gap:14px;margin-bottom:18px}
.chart-card{background:var(--bg1);border:1px solid var(--border);border-radius:15px;padding:18px}
.chart-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.chart-title{font-size:14px;font-weight:900;letter-spacing:-.2px}
.chart-sub{font-size:9px;font-weight:700;letter-spacing:.18em;color:var(--t4);text-transform:uppercase;margin-top:2px}

/* MODE TOGGLE */
.mode-tog{display:flex;background:var(--bg0);border:1.5px solid var(--border);border-radius:9px;padding:2px;gap:2px}
.mbtn{padding:5px 12px;border-radius:7px;font-size:10px;font-weight:800;cursor:pointer;border:none;background:none;color:var(--t4);text-transform:uppercase;letter-spacing:.08em;transition:all .2s;position:relative}
.mbtn.on{background:var(--bg2);color:var(--blue3)}
.mbtn.on::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:14px;height:2px;background:var(--blue);border-radius:1px}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:13px}
.scard{background:var(--bg1);border:1px solid var(--border);border-radius:13px;padding:15px}
.slbl{font-size:9px;font-weight:800;letter-spacing:.22em;color:var(--t4);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.slbl::after{content:'';flex:1;height:1px;background:var(--bg3)}

.vrow{display:flex;justify-content:space-between;align-items:flex-end;padding:11px 0}
.vrow+.vrow{border-top:1px solid var(--bg2)}
.vlbl{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--t3);text-transform:uppercase;margin-bottom:4px}
.vval{font-size:18px;font-weight:900;display:flex;align-items:center;gap:6px}
.vval i{font-size:14px;color:var(--indigo)}
.vrt{text-align:right}
.vtag{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.vsub{font-size:10px;color:var(--t3);font-weight:600}

.hs{display:flex;align-items:center;padding:8px 9px;border-radius:9px;cursor:pointer;border:1.5px solid transparent;transition:all .18s;gap:9px;margin-bottom:2px}
.hs:hover{background:var(--bg2);border-color:var(--border)}
.hs.on{background:#0d1f3c;border-color:var(--blue2)}
.hs-rank{width:20px;height:20px;border-radius:5px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:var(--t4);flex-shrink:0}
.hs.on .hs-rank{background:#1e3a5f;color:var(--blue3)}
.hs-info{flex:1;min-width:0}
.hs-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hs-pop{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--t4);text-transform:uppercase;margin-top:1px}
.hs-pct{font-size:13px;font-weight:900;letter-spacing:-.3px}
.hs-pct.hi{color:#fb7185}
.hs-pct.med{color:var(--green2)}
.hs-rlbl{font-size:8px;font-weight:700;color:var(--t4);text-transform:uppercase;text-align:right;margin-top:1px}
.more-btn{width:100%;margin-top:8px;padding:8px;background:none;border:1.5px solid var(--border);border-radius:9px;color:var(--blue3);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:5px}
.more-btn:hover{background:rgba(37,99,235,.08);border-color:var(--blue2)}

/* SEL BANNER */
.sel-ban{display:flex;align-items:center;gap:9px;margin-bottom:16px;padding:10px 13px;background:#0d1f3c;border:1.5px solid var(--blue2);border-radius:11px}
.back-btn{width:27px;height:27px;background:var(--bg2);border:1.5px solid #1e3a5f;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:13px;font-weight:900;transition:all .15s;flex-shrink:0}
.back-btn:hover{background:var(--bg3);color:var(--t1)}
.sel-lbl{font-size:9px;font-weight:800;letter-spacing:.18em;color:var(--t4);text-transform:uppercase}
.sel-name{font-size:13px;font-weight:900;color:var(--blue3);letter-spacing:-.2px}
.sel-meta{font-size:10px;color:var(--t4);font-weight:600;margin-top:1px}

/* AI SECTION */
.ai-sec{background:#040b18;border:1px solid #0f2040;border-radius:18px;padding:22px;position:relative;overflow:hidden;margin-bottom:4px}
.ai-glow{position:absolute;top:-60px;right:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,.06) 0%,transparent 70%);pointer-events:none}
.ai-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:14px}
.ai-ttl-row{display:flex;align-items:center;gap:11px}
.ai-badge{width:44px;height:44px;background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.25);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-badge i{font-size:22px;color:var(--blue3)}
.ai-heading{font-size:17px;font-weight:900;letter-spacing:-.3px}
.ai-sub{font-size:11px;color:var(--t4);margin-top:2px;font-weight:600}

/* RUN BUTTON */
.run-btn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;border:none;padding:12px 24px;border-radius:12px;font-size:12px;font-weight:900;cursor:pointer;flex-shrink:0;transition:all .22s;box-shadow:0 6px 24px rgba(37,99,235,.3);text-transform:uppercase;letter-spacing:.06em}
.run-btn i{font-size:15px}
.run-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 32px rgba(37,99,235,.45)}
.run-btn:active:not(:disabled){transform:scale(.97)}
.run-btn:disabled{opacity:.55;cursor:not-allowed}

/* AI RESULTS */
.ai-results{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.acard{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:11px;padding:13px}
.acard.full{grid-column:1/-1}
.acard.hi{background:rgba(37,99,235,.06);border-color:rgba(37,99,235,.2)}
.acard.reco{background:rgba(37,99,235,.1);border-color:rgba(59,130,246,.3)}
.albl{font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;margin-bottom:9px}
.albl.bl{color:var(--blue3)}.albl.am{color:#fbbf24}.albl.gr{color:var(--green2)}.albl.rs{color:#fb7185}.albl.in{color:var(--indigo)}.albl.cy{color:#22d3ee}
.sum-txt{font-size:12px;color:var(--t2);font-style:italic;font-weight:600;line-height:1.7}
.mrow{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px}
.mk{color:var(--t3);font-weight:600}.mv{color:var(--t1);font-weight:800}
.sbar-wrap{margin-bottom:8px}
.sbar-top{display:flex;justify-content:space-between;font-size:10px;font-weight:700;margin-bottom:3px;color:var(--t3)}
.sbar-track{background:var(--bg2);height:5px;border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;transition:width .9s cubic-bezier(.4,0,.2,1)}
.sbar-fill.sb{background:linear-gradient(90deg,var(--blue2),var(--blue3))}
.sbar-fill.sg{background:linear-gradient(90deg,#059669,var(--green2))}
.sbar-fill.sa{background:linear-gradient(90deg,#d97706,#fbbf24)}
.bsm{font-size:11px;color:var(--t3);line-height:1.7;font-weight:600}
.reco-lbl{font-size:9px;font-weight:800;letter-spacing:.18em;color:var(--blue3);text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.reco-lbl i{font-size:12px}
.reco-txt{font-size:13px;font-weight:900;color:var(--t1);line-height:1.45}
.mini-c-lbl{font-size:9px;font-weight:800;letter-spacing:.18em;color:var(--t4);text-transform:uppercase;margin-bottom:11px}

/* TABLE */
.tbl-wrap{background:var(--bg1);border:1px solid var(--border);border-radius:15px;overflow:hidden}
.tbl-top{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.tbl-top h3{font-size:14px;font-weight:900}
.tbl-cnt{background:var(--bg3);color:var(--t3);padding:3px 9px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:.04em}
.tbl-scroll{overflow-x:auto;max-height:560px;overflow-y:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:9px 15px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--t4);background:#07101f;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap}
thead th:first-child{text-align:left}
tbody tr{border-bottom:1px solid rgba(255,255,255,.02);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody td{padding:9px 15px;font-size:12px;text-align:center;color:var(--t3)}
tbody td:first-child{text-align:left}
.cname{display:flex;align-items:center;gap:7px}
.cdot{width:6px;height:6px;border-radius:50%;background:var(--blue2);flex-shrink:0}
.cname-t{font-weight:700;color:var(--t2)}
.ccode-t{font-size:9px;font-weight:800;background:var(--bg2);border:1px solid var(--border);padding:1px 5px;border-radius:4px;color:var(--t4);letter-spacing:.04em}
.gbadge{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:800;display:inline-block}
.gbadge.hi{background:rgba(244,63,94,.1);color:#fb7185;border:1px solid rgba(244,63,94,.2)}
.gbadge.md{background:rgba(16,185,129,.1);color:var(--green2);border:1px solid rgba(16,185,129,.2)}
.gbadge.lo{background:rgba(71,85,105,.1);color:var(--t3);border:1px solid rgba(71,85,105,.2)}
.gbadge.ng{background:rgba(244,63,94,.08);color:#f87171;border:1px solid rgba(244,63,94,.15)}
.chart-c{height:268px}
.mini-c-c{height:148px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .45s ease}
</style>

</div>

</div>

  NGA:{h:[{y:1970,p:0.056},{y:1980,p:0.073},{y:1990,p:0.097},{y:2000,p:0.130},{y:2010,p:0.173},{y:2020,p:0.218},{y:2024,p:0.234}],j:[{y:2024,p:0.234},{y:2030,p:0.278},{y:2050,p:0.440},{y:2100,p:0.791}]},
  JPN:{h:[{y:1970,p:0.104},{y:1980,p:0.117},{y:1990,p:0.124},{y:2000,p:0.127},{y:2010,p:0.128},{y:2020,p:0.126},{y:2024,p:0.124}],j:[{y:2024,p:0.124},{y:2030,p:0.122},{y:2050,p:0.106},{y:2100,p:0.075}]},
};

function getPop(code,mode){
  const r=POP[code]||POP.WLD;
  if(!POP[code]){
    const c=C.find(x=>x.code===code);
    const g=(c?.cia||1.0)/100;
    const base=0.01;
    const recs=mode==='h'
      ?[1970,1980,1990,2000,2010,2020,2024].map(y=>({y,p:+(base/Math.pow(1+g,2024-y)).toFixed(4)}))
      :[2024,2030,2050,2100].map(y=>({y,p:+(base*Math.pow(1+g,y-2024)).toFixed(4)}));
    return recs;
  }
  return mode==='h'?r.h:r.j;
}

const HS=C.filter(x=>x.code!=='WLD'&&x.cia!=null).sort((a,b)=>b.cia-a.cia).slice(0,12);
let ST={view:'dash',sel:null,mode:'h',more:false,pred:null,busy:false};

function getC(code){return C.find(c=>c.code===code)||C.find(c=>c.code==='WLD');}
function fB(b){if(b>=1)return b.toFixed(2)+'B';if(b>=0.001)return(b*1000).toFixed(b*1000>=100?0:1)+'M';return(b*1e6).toFixed(0)+'K';}
function fM(n){if(n==null)return '85K';const a=Math.abs(n);const s=n>0?'+':'';return a>=1e6?s+(n/1e6).toFixed(1)+'M':s+(n/1000).toFixed(0)+'K';}

function setView(v){ST.view=v;document.getElementById('vb-dash').className='vbtn'+(v==='dash'?' on':'');document.getElementById('vb-tbl').className='vbtn'+(v==='tbl'?' on':'');render();}
function goHome(){ST.sel=null;ST.mode='h';ST.pred=null;ST.view='dash';document.getElementById('vb-dash').className='vbtn on';document.getElementById('vb-tbl').className='vbtn';render();}
function pick(code){ST.sel=code;ST.mode='h';ST.pred=null;ST.view='dash';document.getElementById('vb-dash').className='vbtn on';document.getElementById('vb-tbl').className='vbtn';closeSearch();render();window.scrollTo({top:0,behavior:'smooth'});}
function setMode(m){if(ST.mode===m)return;ST.mode=m;ST.pred=null;render();}
function toggleMore(){ST.more=!ST.more;render();}
function clearSel(){ST.sel=null;ST.mode='h';ST.pred=null;render();}
function closeSearch(){document.getElementById('srch-drop').style.display='none';document.getElementById('srch-in').value='';}

function doSearch(q){
  const el=document.getElementById('srch-drop');
  if(!q.trim()){el.style.display='none';return;}
  const res=C.filter(c=>c.n.toLowerCase().includes(q.toLowerCase())||c.code.toLowerCase().includes(q.toLowerCase())).slice(0,9);
  if(!res.length){el.style.display='none';return;}
  el.innerHTML=res.map(c=>`<div class="srch-item" role="option" onclick="pick('${c.code}')"><span class="cname-t">${c.n}</span><span class="srch-code">${c.code}</span></div>`).join('');
  el.style.display='block';
}
document.addEventListener('click',e=>{if(!e.target.closest('.srch-wrap'))closeSearch();});

function runPred(){
  if(ST.busy)return;ST.busy=true;ST.pred=null;render();
  setTimeout(()=>{
    const c=getC(ST.sel||'WLD');
    const jr=getPop(c.code,'j');
    const lp=jr[jr.length-1].p;
    const g=c.cia||0.8;const t=g>0.5?'Positive':g<0?'Negative':'Stable';
    ST.pred={
      sum:`Demograph V4 ML analysis for ${c.n}: ${t==='Positive'?'sustained expansion through 2100':'long-term contraction forecast'}. Linear regression projects ${fB(lp)} by 2100 with ~87% validation accuracy.`,
      ma:c.ma||'N/A',gr:g.toFixed(2)+'%',tr:t,pk:g>0?'2070–2085 (est.)':'2024 (Peak)',
      labor:`Labor Growth: ${g>1.5?'Extreme':g>0.5?'Moderate':'Low/Negative'} | Youth Share: ${c.ma!=null&&c.ma<25?'High':'Moderate'} | Dependency Ratio: ${c.ma!=null&&c.ma>35?'Worsening':'Improving'}.`,
      strat:`Opportunity Window: ${c.ma!=null&&c.ma<29?'Active':'Closed'} | Infrastructure Pressure: ${g>1.8?'Extreme':'Manageable'} | Healthcare Demand: ${c.ma!=null&&c.ma>40?'Critical':'Moderate'}.`,
      risks:c.ma!=null&&c.ma>38?'Pension sustainability and labor shortages pose long-term fiscal risk.':'Social friction from youth bulge and infrastructure bottlenecks.',
      drivers:c.ma!=null&&c.ma<30?'Digital transformation and demographic dividend from youth labor supply.':'Automation, high-skill immigration, and capital accumulation.',
      sc:{s:Math.round(68+Math.random()*20),su:Math.round(48+(g<2?22:0)),i:Math.round(38+(c.ma!=null&&c.ma>30?30:12))},
      reco:c.ma!=null&&c.ma<30?'Invest in education, digital infrastructure, and vocational training to capture the youth dividend.':'Accelerate robotics integration and selective immigration policy to sustain industrial output.',
      chart:jr.map(r=>({y:r.y,p:+(r.p*1000).toFixed(0)})),
      code:c.code,name:c.n
    };
    ST.busy=false;render();requestAnimationFrame(drawAll);
  },1500);
}

function render(){
  document.getElementById('content').innerHTML=ST.view==='tbl'?renderTbl():renderDash();
  if(ST.view==='dash')requestAnimationFrame(drawAll);
}

function renderDash(){
  const code=ST.sel||'WLD';const c=getC(code);
  const recs=getPop(code,ST.mode);
  const last=recs[recs.length-1];const prev=recs[recs.length-2];
  const pStr=fB(last.p);
  let gr='';
  if(prev){const rate=((last.p-prev.p)/prev.p/(Math.abs(last.y-prev.y)||1))*100;gr=(rate>=0?'+':'')+rate.toFixed(2)+'%';}
  else gr=c.cia!=null?`+${c.cia}%`:'1.17%';
  const dn=gr.startsWith('-');
  const hs=HS.slice(0,ST.more?12:5);

  return `
  ${ST.sel?`<div class="sel-ban fade">
    <button class="back-btn" onclick="clearSel()" aria-label="Go back"><i class="ti ti-x" aria-hidden="true"></i></button>
    <div><div class="sel-lbl">Viewing country</div><div class="sel-name">${c.n}</div><div class="sel-meta">Code: ${c.code} · Click ✕ to return to world view</div></div>
  </div>`:''}
  <div class="stats">
    <div class="sc"><div class="sc-top"><div class="sc-icon bl"><i class="ti ti-users" style="color:#60a5fa" aria-hidden="true"></i></div><span class="badge ${dn?'dn':'up'}">${dn?'↓':'↑'} ${gr}</span></div><div class="sc-lbl">${ST.sel?c.n:'World'} Population</div><div class="sc-val">${pStr}</div></div>
    <div class="sc"><div class="sc-top"><div class="sc-icon gr"><i class="ti ti-trending-up" style="color:#34d399" aria-hidden="true"></i></div><span class="badge nu">${ST.mode==='h'?'Hist. Avg':'UN Forecast'}</span></div><div class="sc-lbl">Growth Rate</div><div class="sc-val">${gr}</div></div>
    <div class="sc"><div class="sc-top"><div class="sc-icon am"><i class="ti ti-calendar" style="color:#fbbf24" aria-hidden="true"></i></div><span class="badge nu">2024</span></div><div class="sc-lbl">Median Age</div><div class="sc-val">${c.ma??'N/A'}<span style="font-size:14px;color:var(--t4)"> Yrs</span></div></div>
    <div class="sc"><div class="sc-top"><div class="sc-icon rs"><i class="ti ti-heart" style="color:#fb7185" aria-hidden="true"></i></div><span class="badge up">↑ Rising</span></div><div class="sc-lbl">Life Expectancy</div><div class="sc-val">${c.le??'73.3'}<span style="font-size:14px;color:var(--t4)"> Yrs</span></div></div>
  </div>

  <div class="main-grid">
    <div class="chart-card">
      <div class="chart-hdr">
        <div><div class="chart-title">${c.n} · Demographic Flow</div><div class="chart-sub">Epoch · ${ST.mode==='h'?'1970 – 2024':'2024 – 2100'}</div></div>
        <div class="mode-tog">
          <button class="mbtn${ST.mode==='h'?' on':''}" onclick="setMode('h')">History</button>
          <button class="mbtn${ST.mode==='j'?' on':''}" onclick="setMode('j')">Projections</button>
        </div>
      </div>
      <div class="chart-c"><canvas id="mc" width="100%" height="260" role="img" aria-label="Population chart for ${c.n}"></canvas></div>
    </div>
    <div class="sidebar">
      <div class="scard">
        <div class="slbl">Vitality Balance</div>
        <div class="vrow"><div><div class="vlbl">Net Migration</div><div class="vval"><i class="ti ti-plane" aria-hidden="true"></i>${fM(c.mig)}</div></div><div class="vrt"><div class="vtag" style="color:var(--indigo)">Contribution</div><div class="vsub">+${code==='USA'?'45':'0'}% Growth</div></div></div>
        <div class="vrow"><div><div class="vlbl">Longevity Index</div><div class="vval"><i class="ti ti-heart-rate-monitor" style="color:#fb7185" aria-hidden="true"></i>${c.le??'73.3'}<span style="font-size:11px;color:var(--t3);font-weight:600"> Yrs</span></div></div><div class="vrt"><div class="vtag" style="color:#fb7185">Global Rank</div><div class="vsub">#33 Centenarian</div></div></div>
      </div>
      <div class="scard">
        <div class="slbl">Growth Leaders</div>
        ${hs.map((h,i)=>`<div class="hs${h.code===ST.sel?' on':''}" onclick="pick('${h.code}')">
          <div class="hs-rank">${i+1}</div>
          <div class="hs-info"><div class="hs-name">${h.n}</div><div class="hs-pop">${h.code}</div></div>
          <div style="text-align:right"><div class="hs-pct${h.cia>3?' hi':' med'}">${h.cia.toFixed(1)}%</div><div class="hs-rlbl">CIA Rate</div></div>
        </div>`).join('')}
        <button class="more-btn" onclick="toggleMore()"><i class="ti ti-chevron-${ST.more?'up':'down'}" aria-hidden="true"></i>${ST.more?'Collapse':'Show More'}</button>
      </div>
    </div>
  </div>

  <div class="ai-sec">
    <div class="ai-glow"></div>
    <div class="ai-hdr">
      <div class="ai-ttl-row">
        <div class="ai-badge"><i class="ti ti-brain" aria-hidden="true"></i></div>
        <div><div class="ai-heading">AI Forecast Engine${ST.pred?` · ${ST.pred.name} (${ST.pred.code})`:` · ${c.n}`}</div><div class="ai-sub">${ST.pred?`ISO: ${ST.pred.code} · Demograph V4 ML · Scope: 2026–2100 · ~87% accuracy`:'Long-range demographic projections based on multi-source synthesis'}</div></div>
      </div>
      <button class="run-btn" onclick="runPred()" ${ST.busy?'disabled':''} aria-label="Run AI prediction">
        <i class="ti ti-${ST.busy?'loader':'bolt'}" style="${ST.busy?'animation:spin 1s linear infinite':''}" aria-hidden="true"></i>
        ${ST.busy?'Synthesizing...':'Run Prediction'}
      </button>
    </div>
    ${ST.pred?renderPred():''}
  </div>`;
}

function renderPred(){
  const p=ST.pred;
  return `<div class="ai-results fade">
    <div class="acard full hi"><div class="albl bl"><i class="ti ti-file-analytics" style="font-size:11px" aria-hidden="true"></i> Executive Summary</div><p class="sum-txt">"${p.sum}"</p></div>
    <div class="acard"><div class="albl bl">Core Metrics</div>
      <div class="mrow"><span class="mk">Median Age</span><span class="mv">${p.ma}</span></div>
      <div class="mrow"><span class="mk">Avg Growth</span><span class="mv">${p.gr}</span></div>
      <div class="mrow"><span class="mk">Trend</span><span class="mv">${p.tr}</span></div>
      <div class="mrow"><span class="mk">Peak Year</span><span class="mv">${p.pk}</span></div>
    </div>
    <div class="acard"><div class="albl cy">System Scores</div>
      <div class="sbar-wrap"><div class="sbar-top"><span>Stability</span><span>${p.sc.s}</span></div><div class="sbar-track"><div class="sbar-fill sb" style="width:${p.sc.s}%"></div></div></div>
      <div class="sbar-wrap"><div class="sbar-top"><span>Sustainability</span><span>${p.sc.su}</span></div><div class="sbar-track"><div class="sbar-fill sg" style="width:${p.sc.su}%"></div></div></div>
      <div class="sbar-wrap"><div class="sbar-top"><span>Infrastructure</span><span>${p.sc.i}</span></div><div class="sbar-track"><div class="sbar-fill sa" style="width:${p.sc.i}%"></div></div></div>
    </div>
    <div class="acard"><div class="albl am">Economic / Labor</div><p class="bsm">${p.labor}</p></div>
    <div class="acard"><div class="albl gr">Strategic Indicators</div><p class="bsm">${p.strat}</p></div>
    <div class="acard"><div class="albl rs">Primary Risks</div><p class="bsm">${p.risks}</p></div>
    <div class="acard"><div class="albl in">Growth Drivers</div><p class="bsm">${p.drivers}</p></div>
    <div class="acard full"><div class="mini-c-lbl">Trajectory Visualization · 2024 → 2100</div><div class="mini-c-c"><canvas id="bc" width="100%" height="140" role="img" aria-label="Population trajectory bar chart"></canvas></div></div>
    <div class="acard full reco"><div class="reco-lbl"><i class="ti ti-bolt" aria-hidden="true"></i> AI Recommendation</div><div class="reco-txt">"${p.reco}"</div></div>
  </div>`;
}

function renderTbl(){
  const rows=C.filter(c=>c.code!=='WLD').sort((a,b)=>a.n.localeCompare(b.n));
  return `<div class="tbl-wrap">
    <div class="tbl-top"><h3>Detailed Growth Index</h3><span class="tbl-cnt">${rows.length} Countries</span></div>
    <div class="tbl-scroll"><table>
      <thead><tr><th style="text-align:left;min-width:170px">Country</th><th>Median Age</th><th>CIA %</th><th>World Bank %</th><th>UN %</th></tr></thead>
      <tbody>${rows.map(c=>{
        const cl=c.cia>3?'hi':c.cia>0?'md':c.cia<0?'ng':'lo';
        return`<tr>
          <td><div class="cname"><div class="cdot"></div><span class="cname-t">${c.n}</span><span class="ccode-t">${c.code}</span></div></td>
          <td>${c.ma??'—'}</td>
          <td>${c.cia!=null?`<span class="gbadge ${cl}">${c.cia}%</span>`:'—'}</td>
          <td style="color:${c.wb!=null&&c.wb<0?'#f87171':c.wb!=null&&c.wb>2?'#fbbf24':'var(--t3)'}">${c.wb!=null?c.wb+'%':'—'}</td>
          <td>${c.un!=null?c.un+'%':'—'}</td></tr>`;
      }).join('')}</tbody>
    </table></div></div>`;
}

function drawAll(){drawArea();if(ST.pred)drawBar();}

function drawArea(){
  const cv=document.getElementById('mc');if(!cv)return;
  const code=ST.sel||'WLD';const recs=getPop(code,ST.mode);
  const ctx=cv.getContext('2d');
  const W=cv.parentElement.clientWidth||660;const H=262;
  cv.width=W;cv.height=H;
  const pad={l:54,r:14,t:12,b:36};
  const vals=recs.map(r=>r.p);
  const mn=Math.min(...vals)*0.92;const mx=Math.max(...vals)*1.07;
  const tx=i=>pad.l+(i/(recs.length-1))*(W-pad.l-pad.r);
  const ty=v=>pad.t+(1-(v-mn)/(mx-mn))*(H-pad.t-pad.b);
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<=4;i++){const y=pad.t+i*(H-pad.t-pad.b)/4;ctx.strokeStyle='rgba(30,41,59,0.8)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();}
  const g=ctx.createLinearGradient(0,pad.t,0,H-pad.b);g.addColorStop(0,'rgba(37,99,235,0.22)');g.addColorStop(1,'rgba(37,99,235,0)');
  ctx.beginPath();ctx.moveTo(tx(0),ty(vals[0]));
  for(let i=1;i<recs.length;i++){const xc=(tx(i-1)+tx(i))/2;ctx.bezierCurveTo(xc,ty(vals[i-1]),xc,ty(vals[i]),tx(i),ty(vals[i]));}
  ctx.lineTo(tx(recs.length-1),H-pad.b);ctx.lineTo(tx(0),H-pad.b);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.strokeStyle='#3b82f6';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.moveTo(tx(0),ty(vals[0]));
  for(let i=1;i<recs.length;i++){const xc=(tx(i-1)+tx(i))/2;ctx.bezierCurveTo(xc,ty(vals[i-1]),xc,ty(vals[i]),tx(i),ty(vals[i]));}
  ctx.stroke();
  recs.forEach((_,i)=>{ctx.beginPath();ctx.arc(tx(i),ty(vals[i]),4.5,0,Math.PI*2);ctx.fillStyle='#1e3a5f';ctx.fill();ctx.strokeStyle='#60a5fa';ctx.lineWidth=2;ctx.stroke();});
  ctx.fillStyle='#334155';ctx.font='600 10px system-ui';ctx.textAlign='center';
  recs.forEach((r,i)=>ctx.fillText(r.y,tx(i),H-10));
  ctx.textAlign='right';
  for(let i=0;i<=4;i++){const v=mn+(mx-mn)*(1-i/4);const y=pad.t+i*(H-pad.t-pad.b)/4;ctx.fillStyle='#334155';ctx.font='600 10px system-ui';ctx.fillText(v>=1?v.toFixed(1)+'B':v>=0.01?(v*1000).toFixed(0)+'M':(v*1e6).toFixed(0)+'K',pad.l-6,y+3.5);}
}

function drawBar(){
  const cv=document.getElementById('bc');if(!cv||!ST.pred)return;
  const data=ST.pred.chart;
  const ctx=cv.getContext('2d');
  const W=cv.parentElement.clientWidth||680;const H=142;
  cv.width=W;cv.height=H;
  const pad={l:10,r:10,t:18,b:26};
  const mx=Math.max(...data.map(d=>d.p));
  const bw=Math.min(72,(W-pad.l-pad.r)/data.length*0.56);
  const sp=(W-pad.l-pad.r-bw*data.length)/(data.length+1);
  ctx.clearRect(0,0,W,H);
  data.forEach((d,i)=>{
    const x=pad.l+sp+(bw+sp)*i;
    const bh=(d.p/mx)*(H-pad.t-pad.b);
    const y=H-pad.b-bh;
    ctx.fillStyle='#1d4ed8';
    ctx.beginPath();
    const r=5;
    ctx.moveTo(x+r,y);ctx.lineTo(x+bw-r,y);ctx.arcTo(x+bw,y,x+bw,y+r,r);ctx.lineTo(x+bw,H-pad.b);ctx.lineTo(x,H-pad.b);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
    ctx.fill();
    ctx.fillStyle='#93c5fd';ctx.font='700 9px system-ui';ctx.textAlign='center';
    const label=d.p>=1000?(d.p/1000).toFixed(1)+'B':d.p+'M';
    ctx.fillText(label,x+bw/2,y-4);
    ctx.fillStyle='#334155';ctx.font='700 10px system-ui';
    ctx.fillText(d.y,x+bw/2,H-8);
  });
}

render();
</script>
